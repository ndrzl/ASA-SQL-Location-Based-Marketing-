<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>MapBoost Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #3498db; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="admin@mapboost.com" value="admin@mapboost.com" required>
            <input type="password" id="password" placeholder="Password" value="admin123" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(document.getElementById('email').value === "admin@mapboost.com" && document.getElementById('password').value === "admin123") {
                window.location.href = "dashboard.html";
            } else {
                alert("Incorrect Email or Password!");
            }
        });
    </script>
</body>
</html>
